<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Sharing App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="mainheader">
            <div>
                <h1>PROJECT SHARING APP</h1>
                <p>View project pieces in one app</p>
            </div>
            <div>
                <a href="/dashboard" class="button login-btn">Log In</a>
            </div>
        </div>
    </header>
    <main>
        <section>
            <article>
                <h2>Calm</h2>
                <figure>
                    <img src="calm.jpg" alt="calm photo collage">
                    <figcaption>Express calm through photo manipulation and collage</figcaption>
                </figure>
            </article>
            <article>
                <h2>Excitement</h2>
                <figure>
                    <img src="excite.jpg" alt="excited photo collage">
                    <figcaption>Express excite through photo manipulation and collage</figcaption>
                </figure>
            </article>
        </section>

    </main>
</body>
</html>
